name = "loop-db"
main = "src/worker.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "loop-db"
database_id = "dc2be36a-b3b9-45a5-9fc8-fb223eb336bf"

[triggers]
# Both schedules fire the same scheduled() handler in worker.ts, which
# dispatches on event.cron:
#   "0 */6 * * *"  -> scrapes Texas Today + HornsLink for new/updated events
#   "*/15 * * * *" -> checks saved/bookmarked events for upcoming start
#                      times and creates reminder notifications
crons = ["0 */6 * * *", "*/15 * * * *"]

# Set your JWT secret as a Workers secret (not in this file):
#   wrangler secret put JWT_SECRET
